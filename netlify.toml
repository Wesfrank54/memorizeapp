[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Netlify sets NODE_ENV=production, which skips devDependencies by default.
  # We need typescript, vite, and plugins to build.
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200